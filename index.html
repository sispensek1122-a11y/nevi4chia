<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Chia ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to bottom,#050816,#0c1630,#1b2b59);
min-height:100vh;
overflow-x:hidden;
color:white;
}

.stars{
position:fixed;
width:100%;
height:100%;
z-index:-2;
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
50%{opacity:.2;}
}

.container{
max-width:800px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:30px;
border-radius:25px;
border:1px solid rgba(255,255,255,0.1);
}

h1{
margin-bottom:15px;
}

button{
padding:12px 24px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
background:#ff6ea8;
color:white;
margin-top:15px;
}

#surat{
display:none;
margin-top:30px;
line-height:1.9;
text-align:left;
white-space:pre-wrap;
}

#counter{
margin:20px 0;
font-size:18px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:30px;
}

.gallery img{
width:220px;
height:220px;
object-fit:cover;
border-radius:18px;
}

.heart{
position:fixed;
color:#ff8fc0;
font-size:20px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

#akhir{
display:none;
margin-top:30px;
}

#pesanAkhir{
margin-top:20px;
font-size:22px;
display:none;
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">

<div class="card">

<h1>untuk chia ❤️</h1>

<p>
ada sesuatu yang ingin gua kasih ke lo
</p>

<div id="counter"></div>

<button onclick="bukaSurat()">
buka surat 💌
</button>

<div id="surat"></div>

<div id="akhir">

<h3>
apakah lo bahagia selama sama gua?
</h3>

<button onclick="jawab()">
iya ❤️
</button>

<div id="pesanAkhir">
makasih ya chia ❤️

gua sayang banget sama lo
</div>

</div>

</div>

</div>

<script>

const text = `chia,

dari semua hal yang pernah datang dan pergi di hidup gua,
lo adalah salah satu alasan kenapa gua masih percaya kalau kebahagiaan bisa datang dalam bentuk seseorang.

sejak 23 mei 2026,
hari-hari yang tadinya biasa aja terasa lebih hidup.

ada banyak hal yang mungkin ga pernah gua ucapin secara langsung,
tapi gua selalu bersyukur karena semesta mempertemukan gua sama lo.

lo ga harus jadi sempurna.

cukup jadi chia yang selama ini gua kenal,
itu udah lebih dari cukup.

kalau suatu hari nanti dunia terasa terlalu berat,
ingat aja kalau ada satu orang yang selalu seneng melihat lo tersenyum.

dan orang itu adalah gua.

terima kasih karena udah hadir.

terima kasih karena udah bertahan.

dan terima kasih karena masih ada sampai hari ini ❤️`;

let i = 0;

function bukaSurat(){

document.getElementById("surat").style.display="block";

const interval = setInterval(()=>{

if(i < text.length){
document.getElementById("surat").innerHTML += text.charAt(i);
i++;
}else{
clearInterval(interval);
document.getElementById("akhir").style.display="block";
}

},30);

}

function jawab(){

document.getElementById("pesanAkhir").style.display="block";

for(let i=0;i<60;i++){

setTimeout(()=>{

const h=document.createElement("div");

h.classList.add("heart");

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(Math.random()*20+15)+"px";

h.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),7000);

},i*120);

}

}

const startDate = new Date("2026-05-23T00:00:00");

setInterval(()=>{

const now = new Date();

const diff = now - startDate;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60))%24);
const minutes = Math.floor((diff/(1000*60))%60);

document.getElementById("counter").innerHTML =
`✨ 23 mei 2026<br><br>
sudah berjalan<br>
<b>${days}</b> hari
<b>${hours}</b> jam
<b>${minutes}</b> menit`;

},1000);

for(let i=0;i<120;i++){

const star=document.createElement("div");

star.classList.add("star");

const size=Math.random()*3+1;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

star.style.animationDelay=Math.random()*3+"s";

document.getElementById("stars").appendChild(star);

}

setInterval(()=>{

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+4)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),7000);

},1200);

</script>

</body>
</html>
